version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - revive
    - gocritic
    - misspell
    - unconvert
    - errorlint
    - exhaustive
    - gosec
    - bodyclose
    - nolintlint
    - usestdlibvars
    - nakedret
    - whitespace
    - durationcheck
    - unparam
    - lll
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

  settings:
    lll:
      line-length: 120
    revive:
      rules:
        - name: exported
          disabled: true
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      disabled-checks:
        - exitAfterDefer

formatters:
  enable:
    - goimports

output:
  sort-order:
    - file

run: {}
